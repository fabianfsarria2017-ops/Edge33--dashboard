<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge33 PRO</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:Arial}

.app{display:grid;grid-template-columns:260px 1fr;height:100vh}

.sidebar{background:#111;padding:20px}
.tab{display:block;margin:10px 0;padding:10px;border-radius:8px;background:none;border:none;color:#aaa;cursor:pointer}
.tab.active{background:#333;color:#fff}

.main{padding:20px}

.panel{display:none}
.panel.active{display:block}

button{cursor:pointer}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>Edge33</h2>

<button id="focusTrade">+ Agregar operación</button>

<button class="tab active" data-tab="dashboard">Dashboard</button>
<button class="tab" data-tab="registro">Registro</button>
<button class="tab" data-tab="graficas">Gráficas</button>
<button class="tab" data-tab="analisis">Análisis</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="panel active">
<h1>Dashboard</h1>
<p>Todo funcionando 🔥</p>
</div>

<!-- REGISTRO -->
<div id="registro" class="panel">
<h1>Registro</h1>

<input id="asset" placeholder="Activo">
<input id="entry" placeholder="Entrada" type="number">
<input id="exit" placeholder="Salida" type="number">

<button id="addBtn">Guardar</button>

</div>

<!-- GRAFICAS -->
<div id="graficas" class="panel">
<h1>Gráficas</h1>
</div>

<!-- ANALISIS -->
<div id="analisis" class="panel">
<h1>Análisis</h1>
</div>

</div>
</div>

<script>

// =====================
// STORAGE
// =====================
const STORAGE_KEY = "edge33";
let trades = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

const $ = id => document.getElementById(id);

// =====================
// TABS (SOLUCIÓN FINAL)
// =====================
document.querySelectorAll(".tab").forEach(btn => {

btn.addEventListener("click", () => {

document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

btn.classList.add("active");

const id = btn.getAttribute("data-tab");
const panel = document.getElementById(id);

if(panel) panel.classList.add("active");

});

});

// =====================
// BOTÓN MORADO
// =====================
$("focusTrade").addEventListener("click", () => {

document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

document.querySelector('[data-tab="registro"]').classList.add("active");
$("registro").classList.add("active");

});

// =====================
// GUARDAR TRADE
// =====================
$("addBtn").addEventListener("click", () => {

const trade = {
asset: $("asset").value,
entry: $("entry").value,
exit: $("exit").value
};

trades.push(trade);
localStorage.setItem(STORAGE_KEY, JSON.stringify(trades));

alert("Guardado 🚀");

});

</script>

</body>
</html>
