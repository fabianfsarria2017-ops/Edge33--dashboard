<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge33 PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #111827;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

.menu a {
    display: block;
    padding: 10px;
    color: #aaa;
    text-decoration: none;
}

.menu a.active {
    background: #1f2937;
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    width: 180px;
}

.value {
    color: #22c55e;
    font-size: 20px;
}

/* FORM */
.form {
    margin-top: 20px;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    background: #0d1117;
    border: 1px solid #333;
    color: white;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* CHART */
.chart {
    margin-top: 30px;
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Edge33 PRO</div>
    <div class="menu">
        <a class="active">Dashboard</a>
    </div>
</div>

<div class="main">

<div class="cards">
    <div class="card"><p>P&L</p><div id="pnl" class="value">$0</div></div>
    <div class="card"><p>Win Rate</p><div id="wr" class="value">0%</div></div>
    <div class="card"><p>Profit Factor</p><div id="pf" class="value">0</div></div>
    <div class="card"><p>RR Promedio</p><div id="rr" class="value">0</div></div>
</div>

<div class="form">
    <h3>Nueva operación</h3>
    <input type="number" id="resultado" placeholder="Resultado ($)">
    <input type="number" id="riesgo" placeholder="Riesgo ($)">
    <button onclick="addTrade()">Guardar</button>
</div>

<div class="chart">
    <canvas id="equityChart"></canvas>
</div>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

function addTrade(){
    let res = parseFloat(document.getElementById("resultado").value);
    let risk = parseFloat(document.getElementById("riesgo").value);

    trades.push({res, risk});
    localStorage.setItem("trades", JSON.stringify(trades));
    update();
}

function update(){

    let total = 0;
    let wins = 0;
    let gains = 0;
    let losses = 0;
    let rrSum = 0;

    let equity = [];

    trades.forEach(t=>{
        total += t.res;
        equity.push(total);

        if(t.res > 0){
            wins++;
            gains += t.res;
        } else {
            losses += Math.abs(t.res);
        }

        if(t.risk > 0){
            rrSum += t.res / t.risk;
        }
    });

    let wr = trades.length ? (wins / trades.length * 100).toFixed(1) : 0;
    let pf = losses ? (gains / losses).toFixed(2) : gains;
    let rr = trades.length ? (rrSum / trades.length).toFixed(2) : 0;

    document.getElementById("pnl").innerText = "$" + total;
    document.getElementById("wr").innerText = wr + "%";
    document.getElementById("pf").innerText = pf;
    document.getElementById("rr").innerText = rr;

    drawChart(equity);
}

let chart;

function drawChart(data){

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("equityChart"), {
        type: "line",
        data: {
            labels: data.map((_,i)=>i+1),
            datasets: [{
                label: "Equity",
                data: data,
                borderColor: "#22c55e"
            }]
        }
    });
}

update();

</script>

</body>
</html>
